# Фиксированная тёмно-фиолетовая тема (в стиле референса CRAVEAT).
# Цвета применяются нативно Streamlit — согласованно во всех элементах,
# включая таблицы, поля ввода и графики.
[theme]
base = "dark"
backgroundColor = "#17131F"
secondaryBackgroundColor = "#221C33"
textColor = "#E7E4F0"
primaryColor = "#8B5CF6"
font = "sans serif"

[server]
headless = true
